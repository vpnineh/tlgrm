name: Auto Update VPN Configs

on:
  workflow_dispatch: # قابلیت اجرای دستی از پنل گیتهاب
  schedule:
    - cron: '*/30 * * * *'
  push:
    paths:
      - 'source.conf' # اجرای خودکار به محض تغییر و ذخیره فایل source.conf

jobs:
  update-configs:
    runs-on: ubuntu-latest

    permissions:
      contents: write # دسترسی لازم برای کامیت و پوش کردن فایل‌ها

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 🌟 بخش اضافه شده: نصب کتابخانه‌های مورد نیاز اسکریپت
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyTelegramBotAPI maxminddb

      # 🌟 بخش اضافه شده: معرفی متغیرهای امنیتی به اسکریپت پایتون
      - name: Run Config Scraper
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # اجرای اسکریپت پایتون
          python -u main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 🌟 بخش بسیار مهم: ذخیره فایل تاریخچه تا ربات کانفیگ تکراری ندهد
          git add history.txt || true
          
          # اضافه کردن پوشه اشتراک‌ها و فایل‌های تغییر یافته
          git add subscription/
          git add README.md || true
          
          # اگر تغییری وجود داشت کامیت کن، در غیر این صورت خطا نده
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
